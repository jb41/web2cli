      default_format: table

  following:
    description: "Following timeline"
    args:
      limit:
        type: int
        required: false
        default: 20
        description: "Number of tweets"
      sort:
        type: string
        required: false
        default: recent
        description: "Sort order: recent or popular"
    pipeline:
      - request:
          name: fetch
          provider: x_graphql
          operation: HomeLatestTimeline
          variables:
